# ════════════════════════════════════════════════════════════════════
#  ENAYI HOTELS & SUITES — Render Blueprint (Infrastructure as Code)
#  Provisions in ONE step:
#    1. enayi-db        → managed PostgreSQL (FREE tier, lasts ~30 days)
#    2. enayi-backend   → Django API   (Starter, $7/mo, always-on)
#    3. enayi-frontend  → React build  (Static Site, FREE)
#  No Redis needed (the code does not use Celery/Channels/cache).
#
#  HOW TO USE:
#    Push this repo to GitHub, then on Render:  New +  →  Blueprint  →
#    pick the repo. Render reads this file and creates all three services.
#    After it deploys, see DEPLOY_TO_RENDER.md for the 2 follow-up settings.
# ════════════════════════════════════════════════════════════════════

databases:
  - name: enayi-db
    plan: basic-256mb                # 1 GB, free for ~30 days — perfect for a test
    databaseName: enayi_hotels
    user: enayi_user

services:
  # ── Django Backend (API + Admin) ──────────────────────────────────
  - type: web
    name: enayi-backend
    runtime: python
    plan: starter              # $7/mo, always-on (no cold-start failures)
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input"
    preDeployCommand: "python manage.py migrate --no-input && python manage.py reset_rooms_available"
    startCommand: "gunicorn config.wsgi:application --workers 2 --threads 4 --timeout 120 --access-logfile - --error-logfile -"
    healthCheckPath: /api/docs/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true          # Render generates a strong secret for you
      - key: DATABASE_URL
        fromDatabase:
          name: enayi-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "False"               # Render already forces HTTPS at the edge
      # ── Optional: fill these in the dashboard later (sync:false = not in git) ──
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: EMAIL_HOST_USER
        value: enayihotels@gmail.com
        value: enayihotels@gmail.com
      - key: EMAIL_HOST_PASSWORD
        value: rbgeeqcfdbkjxhwi
        value: rbgeeqcfdbkjxhwi
      - key: DEFAULT_FROM_EMAIL
        value: "Enayi Hotels & Suites <enayihotels@gmail.com>"
        value: "Enayi Hotels & Suites <enayihotels@gmail.com>"
      - key: EMAIL_HOST
        value: smtp.gmail.com
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
        value: "True"

  # ── React Frontend (Static Site) ─────────────────────────────────
  - type: web
    name: enayi-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: dist
    envVars:
      # IMPORTANT: after the backend deploys, confirm its URL and update this if
      # Render assigned a different one (e.g. enayi-backend-xxxx.onrender.com).
      - key: VITE_API_URL
        value: "https://enayi-backend.onrender.com"
      - key: VITE_PAYSTACK_PK
        sync: false
    routes:
      # SPA fallback so refreshing /rooms, /booking, etc. doesn't 404
      - type: rewrite
        source: /*
        destination: /index.html
