events { worker_connections 1024; }
http {
  include /etc/nginx/mime.types;
  client_max_body_size 50M;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript;
  upstream backend  { server backend:8000; }
  upstream frontend { server frontend:80; }
  server {
    listen 80;
    location /api/    { proxy_pass http://backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /admin/  { proxy_pass http://backend; proxy_set_header Host $host; }
    location /static/ { alias /var/www/static/; expires 30d; }
    location /media/  { alias /var/www/media/; expires 7d; }
    location /        { proxy_pass http://frontend; proxy_set_header Host $host; }
  }
}
